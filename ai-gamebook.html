<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI自動化ゲームブック｜電脳会社</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e8e0d0;
    font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
    line-height: 1.9;
    min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 0 60px; }

  /* ── 文字サイズ規定 ──
     見出し 44pt / 小見出し 28pt / 本文 22pt / 注意 14pt
     1pt ≈ 1.333px。スマホでも崩れないようclamp()で下限を確保。 */
  .fs-heading    { font-size: clamp(26px, 7.5vw, 58.7px); font-weight: bold; line-height: 1.5; }
  .fs-subheading { font-size: clamp(18px, 5.5vw, 37.3px); font-weight: bold; line-height: 1.6; }
  .fs-body       { font-size: clamp(15px, 4.3vw, 29.3px); line-height: 1.9; }
  .fs-caution    { font-size: clamp(11px, 3vw, 18.7px); line-height: 1.8; }

  /* ── ゴールバー ── */
  .goal-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #141414;
    border-bottom: 1px solid #2a2a2a;
    padding: 12px 18px;
  }
  .goal-bar .label { font-size: clamp(10px, 2.6vw, 14px); color: #888; letter-spacing: 2px; margin-bottom: 4px; }
  .goal-bar .goal { color: #d4a017; font-weight: bold; }
  .goal-bar .goal.fs-subheading { font-size: clamp(14px, 4.5vw, 26px); }

  /* ── 進捗インジケーター ── */
  .levels {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 16px 12px 6px;
  }
  .levels .lv {
    flex: 1;
    max-width: 140px;
    text-align: center;
    padding: 8px 4px;
    border-radius: 10px;
    border: 1px solid #2a2a2a;
    background: #141414;
    opacity: 0.4;
    transition: opacity .3s, border-color .3s;
  }
  .levels .lv.on { opacity: 1; border-color: #22c55e; background: #0d1a12; }
  .levels .lv .ico { font-size: clamp(16px, 4vw, 24px); }
  .levels .lv .name { font-size: clamp(10px, 2.6vw, 13px); color: #888; margin-top: 2px; }
  .levels .lv.on .name { color: #22c55e; }

  .tools-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 8px 12px 0;
    flex-wrap: wrap;
  }
  .tools-row .slot {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: clamp(10px, 2.6vw, 12px);
    color: #555;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    padding: 3px 10px;
    opacity: 0.4;
    transition: opacity .3s, border-color .3s, color .3s;
  }
  .tools-row .slot.on { opacity: 1; border-color: #d4a017; color: #d4a017; }

  /* ── 本編エリア ── */
  .stage { padding: 24px 18px 0; }
  .stage-title { color: #e8e0d0; margin-bottom: 12px; }
  .stage-text {
    color: #ccc;
    background: #0d1117;
    border: 1px solid #2a3a2a;
    border-left: 3px solid #22c55e;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 22px;
  }

  /* ── 案内・注意 ── */
  .note-box {
    background: #0d1117;
    border: 1px solid #2a3a4a;
    border-left: 3px solid #3b82f6;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 18px;
    color: #aac4e0;
  }

  /* ── 呪文（コピペ用プロンプト） ── */
  .spell {
    background: #14110a;
    border: 1px dashed #d4a017;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  .spell .spell-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .spell .spell-label { color: #d4a017; letter-spacing: 1px; }
  .spell .copy-btn {
    flex-shrink: 0;
    background: #1a1200;
    border: 1px solid #d4a017;
    color: #d4a017;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: clamp(11px, 2.8vw, 14px);
    font-weight: bold;
    font-family: inherit;
    cursor: pointer;
  }
  .spell .copy-btn.copied { background: #0d1a12; border-color: #22c55e; color: #22c55e; }
  .spell .spell-body {
    font-family: 'Consolas', 'Menlo', monospace;
    font-size: clamp(13px, 3.6vw, 22px);
    color: #f0d080;
    line-height: 1.9;
    white-space: pre-wrap;
    background: #0a0a0a;
    border-radius: 6px;
    padding: 10px 12px;
  }
  .spell .spell-note { color: #999; margin-top: 8px; }
  .spell .spell-inputs { margin-bottom: 10px; }
  .spell .spell-input-label {
    display: block;
    color: #f0d080;
    font-size: clamp(11px, 2.8vw, 14px);
    margin-bottom: 4px;
  }
  .spell .spell-input-box {
    width: 100%;
    box-sizing: border-box;
    background: #0a0a0a;
    border: 1px solid #444;
    border-radius: 6px;
    color: #fff;
    font-family: inherit;
    font-size: clamp(13px, 3.6vw, 18px);
    padding: 8px 10px;
    margin-bottom: 8px;
    resize: vertical;
  }
  .spell .spell-input-box::placeholder { color: #666; }
  .spell .spell-step {
    color: #d4a017;
    font-size: clamp(11px, 2.8vw, 14px);
    margin-bottom: 6px;
  }

  /* ── アコーディオン式グリッド（中級・上級ハブ） ──
     PCでは2〜3列に並び、開いた項目だけ全幅に広がる。
     段階的開示（progressive disclosure）：見出しだけ並べて、
     興味のあるものだけ開いて詳細を見る。 */
  .acc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
  }
  .acc-item {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .acc-item.open { grid-column: 1 / -1; border-color: #d4a017; }
  .acc-head {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 14px 16px;
    cursor: pointer;
    text-align: left;
    background: none;
    border: none;
    color: inherit;
    font-family: inherit;
  }
  .acc-head:hover { background: #1a1a1a; }
  .acc-head .ch-ico { font-size: clamp(20px, 5vw, 32px); flex-shrink: 0; }
  .acc-head .ch-cat { display: block; color: #d4a017; letter-spacing: 1px; margin-bottom: 2px; }
  .acc-head .ch-title { color: #e8e0d0; }
  .acc-head .arrow { margin-left: auto; color: #888; flex-shrink: 0; transition: transform .2s; }
  .acc-item.open .arrow { transform: rotate(180deg); color: #d4a017; }
  .acc-body { padding: 0 16px 16px; }
  .acc-body .ch-sub { color: #999; margin-bottom: 8px; }
  .acc-body .ch-desc { color: #ccc; margin-bottom: 10px; }
  .acc-body .ch-source { display: block; margin-bottom: 12px; color: #666; }
  .acc-go {
    display: block;
    width: 100%;
    background: #1a1200;
    border: 1px solid #d4a017;
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    color: #d4a017;
    font-weight: bold;
    font-family: inherit;
    cursor: pointer;
  }
  .acc-go:hover { background: #2a2000; }

  /* ── 選択カード ── */
  .choices { display: flex; flex-direction: column; gap: 14px; }
  .choice-card {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color .15s, transform .1s;
    text-align: left;
    width: 100%;
    color: inherit;
    font-family: inherit;
  }
  .choice-card:hover { border-color: #d4a017; }
  .choice-card:active { transform: scale(0.99); }
  .choice-card .ch-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .choice-card .ch-ico { font-size: clamp(20px, 5vw, 32px); flex-shrink: 0; }
  .choice-card .ch-title { color: #d4a017; }
  .choice-card .ch-sub { color: #999; margin-bottom: 8px; }
  .choice-card .ch-desc { color: #ccc; }
  .choice-card .ch-source { display: block; margin-top: 8px; color: #666; }

  /* ── エンディング ── */
  .end-box {
    background: #1a1200;
    border: 1px solid #d4a017;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  .end-box .big { color: #d4a017; margin-bottom: 10px; }
  .end-box .desc { color: #ccc; text-align: left; margin-bottom: 14px; }
  .end-box .time { color: #888; }

  /* ── ナビゲーション ── */
  .nav-bar {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 24px 18px 0;
  }
  .nav-bar button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-size: clamp(12px, 3.2vw, 16px);
    font-weight: bold;
    font-family: inherit;
    cursor: pointer;
    border: 1px solid #2a2a2a;
    background: none;
    color: #888;
  }
  .nav-bar button:disabled { opacity: 0.3; cursor: default; }
  .nav-bar button.restart { border-color: #d4a017; color: #d4a017; }

  .header { text-align: center; padding: 24px 18px 0; }
  .header h1 { color: #d4a017; letter-spacing: 2px; margin-bottom: 6px; }
  .header .sub { color: #888; }

  /* ── 決算城トンマナ：色の帯ワイプ＋フェードイン ── */
  .wipe-band-wrap {
    display: block;
    position: relative;
    overflow: hidden;
  }
  .fade-up {
    opacity: 0;
    transform: translateY(14px);
  }
</style>
</head>

</div>

  super_advanced: {

    text: '1ジャンルだけでも仕事は変わる。でも本当に効いてくるのは、ジャンルをまたいで繋いだとき。',
    choices: [
      { ico: '💴📈', cat: '組み合わせ①', title: '経理 × データ分析', sub: '会計データが自動でダッシュボードに反映される', desc: 'freeeのデータを毎月自動でダッシュボード化し、収支レポートを自動で作って自分宛に送る。「数字を見るために何かを開く」作業がなくなる。', source: '' },
      { ico: '🎬🎙️📣', cat: '組み合わせ②', title: '動画 × 音声 × SNS', sub: '1本の原稿が4つのコンテンツになる', desc: '1つの原稿から、note記事・ポッドキャスト・YouTube動画（デジタルヒューマン）・SNS投稿文を同時に作る「コンテンツ工場」。', source: '' },
      { ico: '📊📝', cat: '組み合わせ③', title: 'BIツール × 議事録', sub: '会議の内容がそのまま進捗管理になる', desc: '会議の議事録から自動でタスク化し、進捗をダッシュボードに反映。Slackで「進捗どう？」と聞けば現状が返ってくる。', source: '' },
      { ico: '📱💬', cat: '組み合わせ④', title: 'アプリ開発 × カスタマーサポート', sub: '自作アプリに自分専用チャットボットを組み込む', desc: '自分専用の業務アプリに、自分のFAQで答えるチャットボットを組み込んで、社外の人にも使ってもらえる「商品」にする。', source: '' },
      { ico: '🧑‍💼📊', cat: '組み合わせ⑤', title: '採用 × BIツール', sub: '応募から内定までの流れが見える化される', desc: '応募者データをダッシュボード化して、「応募→選考→内定」のどこで人が減っているかを可視化する。', source: '' }

  }

let history = [];
let current = 'quiz_intro';
let unlocked = new Set();
let levelsDone = new Set();
let openIndex = null;

function toggleAcc(i) {
  openIndex = (openIndex === i) ? null : i;
  render();
}

/* ── 決算城トンマナ：色の帯ワイプ＋パラパラ文字＋フェードイン ── */
const SCRAMBLE_POOL = 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';

function scrambleText(el) {
  const target = el.textContent.trim();
  if (!target) return;
  el.style.opacity = '1';
  let frame = 0;
  const revealPerFrame = 1.2;
  const totalFrames = Math.ceil(target.length / revealPerFrame) + 8;
  (function tick() {
    const done = Math.floor(frame * revealPerFrame);
    el.textContent = [...target].map((ch, i) => {
      if (/[\s　。、！？・「」【】（）]/.test(ch)) return ch;
      if (i < done) return ch;
      return SCRAMBLE_POOL[Math.floor(Math.random() * SCRAMBLE_POOL.length)];
    }).join('');
    frame++;
    if (frame <= totalFrames) requestAnimationFrame(tick);
    else el.textContent = target;
  })();
}

function runWipe(container, color, onMid) {
  const band = document.createElement('div');
  band.style.cssText = `
    position:absolute; inset:0; z-index:10;
    background:${color};
    transform:translateX(-101%);
    transition:transform 0.38s cubic-bezier(0.7,0,0.3,1);
    pointer-events:none;
  `;
  container.style.position = 'relative';
  container.style.overflow = 'hidden';
  container.appendChild(band);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      band.style.transform = 'translateX(0)';
      setTimeout(() => {
        if (onMid) onMid();
        band.style.transform = 'translateX(101%)';
        setTimeout(() => band.remove(), 420);
      }, 380);
    });
  });
}

function animateTitle(el, color) {
  el.style.opacity = '0';
  const wrap = document.createElement('span');
  wrap.className = 'wipe-band-wrap';
  el.parentNode.insertBefore(wrap, el);
  wrap.appendChild(el);
  runWipe(wrap, color, () => {
    el.style.opacity = '1';
    scrambleText(el);
  });
}

function fadeUp(el, delay) {
  el.classList.add('fade-up');
  el.style.transition = `opacity 0.55s ${delay}ms ease, transform 0.55s ${delay}ms ease`;
  requestAnimationFrame(() => {
    setTimeout(() => {
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    }, 30);
  });
}

function playEntranceAnim(stageEl) {
  const title = stageEl.querySelector('.stage-title, .end-box .big');
  if (title) animateTitle(title, '#d4a017');

  const rest = stageEl.querySelectorAll('.note-box, .stage-text, .spell, .end-box .desc, .end-box .time, .choices .choice-card, .acc-grid .acc-item');
  rest.forEach((el, i) => fadeUp(el, i * 80));
}

function render() {
  const scene = scenes[current];

  if (scene.goal) {
    document.getElementById('goalText').textContent = scene.goal;
  }
  if (scene.level) {
    levelsDone.add(scene.level);
  }

  // レベルバッジ
  const lvEl = document.getElementById('levels');
  lvEl.innerHTML = '';
  Object.entries(LEVELS).forEach(([key, l]) => {
    const div = document.createElement('div');
    div.className = 'lv' + (levelsDone.has(key) ? ' on' : '');
    div.innerHTML = `<div class="ico">${l.ico}</div><div class="name">${l.name}</div>`;
    lvEl.appendChild(div);
  });

  // ツールアイコン
  const toolEl = document.getElementById('toolsRow');
  toolEl.innerHTML = '';
  Object.entries(TOOLS).forEach(([key, t]) => {
    const div = document.createElement('div');
    div.className = 'slot' + (unlocked.has(key) ? ' on' : '');
    div.innerHTML = `${t.ico} ${t.name}`;
    toolEl.appendChild(div);
  });

  // 本編
  const stageEl = document.getElementById('stage');
  {
    let html = '';
    if (scene.end) {
      html += `
        <div class="end-box">
          <div class="big fs-subheading">${scene.title}</div>
          <div class="desc fs-body">${scene.desc}</div>
          <div class="time fs-caution">${scene.time}</div>
        </div>
      `;
    } else {
      html += `<div class="stage-title fs-heading">${scene.title}</div>`;
      if (scene.note) {
        html += `<div class="note-box fs-caution">${scene.note}</div>`;
      }
      html += `<div class="stage-text fs-body">${scene.text}</div>`;
    }
    if (scene.spells) {
      scene.spells.forEach((s, i) => {
        let inputsHtml = '';
        if (s.inputs) {
          inputsHtml += `<div class="spell-step">①まず下に書き込む → ②コピー → ③AIに貼って送信</div>`;
          inputsHtml += `<div class="spell-inputs">`;
          s.inputs.forEach((inp, ii) => {
            inputsHtml += `
              <label class="spell-input-label">✏️ ${inp.label}</label>
              <textarea class="spell-input-box" id="spell-input-${current}-${i}-${ii}" placeholder="${inp.placeholder}" rows="${inp.rows || 2}"></textarea>
            `;
          });
          inputsHtml += `</div>`;
        }
        html += `
          <div class="spell">
            <div class="spell-head">
              <div class="spell-label fs-subheading">${s.label}</div>
              <button class="copy-btn" onclick="copySpell(this, '${current}', ${i})">📋 コピー</button>
            </div>
            ${inputsHtml}
            <div class="spell-body">${s.body}</div>
            <div class="spell-note fs-caution">${s.note}</div>
          </div>
        `;
      });
    }
    if (scene.choices && scene.grid) {
      // アコーディオン式グリッド：見出しだけ並べて、開いた項目だけ詳細表示
      html += `<div class="acc-grid">`;
      scene.choices.forEach((c, i) => {
        const isOpen = openIndex === i;
        html += `
          <div class="acc-item${isOpen ? ' open' : ''}">
            <button class="acc-head" onclick="toggleAcc(${i})">
              <div class="ch-ico">${c.ico}</div>
              <div>
                ${c.cat ? `<span class="ch-cat fs-caution">${c.cat}</span>` : ''}
                <div class="ch-title fs-subheading">${c.title}</div>
              </div>
              <div class="arrow">▼</div>
            </button>
            ${isOpen ? `
              <div class="acc-body">
                <div class="ch-sub fs-caution">${c.sub}</div>
                <div class="ch-desc fs-body">${c.desc}</div>
                ${c.source ? `<span class="ch-source fs-caution">${c.source}</span>` : ''}
                ${scene.infoOnly ? '' : `<button class="acc-go fs-subheading" onclick="choose(${i})">これに進む ▶</button>`}
              </div>
            ` : ''}
          </div>
        `;
      });
      html += `</div>`;
    } else if (scene.choices) {
      html += `<div class="choices">`;
      scene.choices.forEach((c, i) => {
        html += `
          <button class="choice-card" onclick="choose(${i})">
            <div class="ch-head"><div class="ch-ico">${c.ico}</div><div class="ch-title fs-subheading">${c.title}</div></div>
            <div class="ch-sub fs-caution">${c.sub}</div>
            <div class="ch-desc fs-body">${c.desc}</div>
            ${c.source ? `<span class="ch-source fs-caution">${c.source}</span>` : ''}
          </button>
        `;
      });
      html += `</div>`;
    }
    stageEl.innerHTML = html;
    playEntranceAnim(stageEl);
  }

  document.getElementById('backBtn').disabled = history.length === 0;
}

function copySpell(btn, sceneId, idx) {
  const s = scenes[sceneId].spells[idx];
  let text = s.body;
  if (s.inputs) {
    s.inputs.forEach((inp, ii) => {
      const el = document.getElementById(`spell-input-${sceneId}-${idx}-${ii}`);
      const val = (el && el.value.trim()) ? el.value.trim() : `（${inp.label}）`;
      text = text.split('{{' + inp.key + '}}').join(val);
    });
  }
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = '✅ コピーした';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('copied');
    }, 1800);
  });
}

function choose(i) {
  const choice = scenes[current].choices[i];
  choice.unlock.forEach(u => unlocked.add(u));
  history.push(current);
  current = choice.next;
  openIndex = null;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (history.length === 0) return;
  current = history.pop();
  openIndex = null;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  history = [];
  current = 'quiz_intro';
  unlocked = new Set();
  levelsDone = new Set();
  openIndex = null;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
