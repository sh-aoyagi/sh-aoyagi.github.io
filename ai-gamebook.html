<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e8e0d0;
    font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
    line-height: 1.9;
    font-size: 15px;

  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 0 60px; }

  /* ── ゴールバー（固定表示） ── */
  .goal-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #141414;
    border-bottom: 1px solid #2a2a2a;
    padding: 12px 18px;
  }
  .goal-bar .label { font-size: 10px; color: #888; letter-spacing: 2px; margin-bottom: 4px; }
  .goal-bar .goal { font-size: 14px; color: #d4a017; font-weight: bold; }

  /* ── 進捗インジケーター ── */
  .progress {
    display: flex;
    justify-content: center;
    gap: 14px;
    padding: 16px 12px 4px;
  }
  .progress .slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0.25;
    transition: opacity .3s, transform .3s;
  }
  .progress .slot.on {
    opacity: 1;
    transform: translateY(-2px);
  }
  .progress .slot .ico {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: #141414;
    border: 1px solid #2a2a2a;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .progress .slot.on .ico { border-color: #22c55e; background: #0d1a12; }
  .progress .slot .name { font-size: 9px; color: #888; }
  .progress .slot.on .name { color: #22c55e; }

  /* ── 本編エリア ── */
  .stage { padding: 24px 18px 0; }
  .stage-title {
    font-size: 18px;
    color: #e8e0d0;
    font-weight: bold;
    margin-bottom: 12px;
    line-height: 1.6;
  }
  .stage-text {
    font-size: 14px;
    color: #ccc;
    background: #0d1117;
    border: 1px solid #2a3a2a;
    border-left: 3px solid #22c55e;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 22px;
  }

  /* ── 選択カード ── */
  .choices { display: flex; flex-direction: column; gap: 14px; }
  .choice-card {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color .15s, transform .1s;
    text-align: left;
    width: 100%;
    color: inherit;
    font-family: inherit;
  }
  .choice-card:hover { border-color: #d4a017; }
  .choice-card:active { transform: scale(0.99); }
  .choice-card .ch-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .choice-card .ch-ico { font-size: 24px; flex-shrink: 0; }
  .choice-card .ch-title { font-size: 15px; font-weight: bold; color: #d4a017; }
  .choice-card .ch-sub { font-size: 12px; color: #999; margin-bottom: 8px; line-height: 1.7; }
  .choice-card .ch-desc { font-size: 12.5px; color: #ccc; line-height: 1.9; }
  .choice-card .ch-source {
    display: block;
    margin-top: 8px;
    font-size: 10px;
    color: #666;
  }

  /* ── エンディング ── */
  .end-box {
    background: #1a1200;
    border: 1px solid #d4a017;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  .end-box .big { font-size: 17px; color: #d4a017; font-weight: bold; margin-bottom: 10px; }
  .end-box .desc { font-size: 13px; color: #ccc; line-height: 1.9; text-align: left; margin-bottom: 14px; }
  .end-box .time { font-size: 12px; color: #888; }

  .nav-bar {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 24px 18px 0;

  .nav-bar button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: bold;
    font-family: inherit;
    cursor: pointer;
    border: 1px solid #2a2a2a;
    background: none;
    color: #888;
  }
  .nav-bar button:disabled { opacity: 0.3; cursor: default; }
  .nav-bar button.restart { border-color: #d4a017; color: #d4a017; }

  /* ── 呪文（コピペ用プロンプト） ── */
  .spell {
    background: #14110a;
    border: 1px dashed #d4a017;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  .spell .spell-label {
    font-size: 11px;
    color: #d4a017;
    font-weight: bold;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .spell .spell-body {
    font-family: 'Consolas', 'Menlo', monospace;
    font-size: 12.5px;
    color: #f0d080;
    line-height: 1.8;

  .spell .spell-note {
    font-size: 11px;
    color: #999;

    background: #0d1117;

    padding: 12px 16px;
    margin-bottom: 18px;
    font-size: 12.5px;
    color: #aac4e0;
    line-height: 1.8;

  .header .sub { font-size: 12px; color: #888; line-height: 1.8; }

    end: true,
    desc: 'GitHubに記録の倉庫ができた。データ接続はまた今度でOK。まずはここで一区切り。',
    time: '所要時間の目安：30分くらい／必要な課金：Claude Pro（約3,000円/月）のみ'
  }
};

let history = [];
let current = 'start';
let unlocked = new Set();

function render() {
  const scene = scenes[current];

  // 進捗インジケーター
  const progEl = document.getElementById('progress');
  progEl.innerHTML = '';
  Object.entries(TOOLS).forEach(([key, t]) => {
    const slot = document.createElement('div');
    slot.className = 'slot' + (unlocked.has(key) ? ' on' : '');
    slot.innerHTML = `<div class="ico">${t.ico}</div><div class="name">${t.name}</div>`;
    progEl.appendChild(slot);
  });

  // 本編
  const stageEl = document.getElementById('stage');
  if (scene.end) {
    stageEl.innerHTML = `
      <div class="end-box">
        <div class="big">${scene.title}</div>
        <div class="desc">${scene.desc}</div>
        <div class="time">${scene.time}</div>
      </div>
    `;
  } else {
    let html = `<div class="stage-title">${scene.title}</div>`;
    if (scene.note) {
      html += `<div class="note-box">${scene.note}</div>`;
    }
    html += `<div class="stage-text">${scene.text}</div>`;
    if (scene.spell) {
      html += `
        <div class="spell">
          <div class="spell-label">${scene.spell.label}</div>
          <div class="spell-body">${scene.spell.body}</div>
          <div class="spell-note">${scene.spell.note}</div>
        </div>
      `;
    }
    html += `<div class="choices">`;
    scene.choices.forEach((c, i) => {
      html += `
        <button class="choice-card" onclick="choose(${i})">
          <div class="ch-head"><div class="ch-ico">${c.ico}</div><div class="ch-title">${c.title}</div></div>
          <div class="ch-sub">${c.sub}</div>
          <div class="ch-desc">${c.desc}</div>
          ${c.source ? `<span class="ch-source">${c.source}</span>` : ''}
        </button>
      `;
    });
    html += `</div>`;
    stageEl.innerHTML = html;
  }

  document.getElementById('backBtn').disabled = history.length === 0;
}

function choose(i) {
  const choice = scenes[current].choices[i];
  choice.unlock.forEach(u => unlocked.add(u));
  history.push(current);
  current = choice.next;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (history.length === 0) return;
  current = history.pop();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  history = [];
  current = 'start';
  unlocked = new Set();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
</body>
</html>
