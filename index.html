<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0f0f0f;--card:#1a1a1a;--border:#2a2a2a;--text:#fff;--muted:#888;--teal:#3DCFC2;--gold:#d4a017;}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',sans-serif;min-height:100vh;}
.nav{position:sticky;top:0;z-index:100;background:rgba(15,15,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 18px;gap:12px;}
.nav-logo{font-size:15px;font-weight:700;color:var(--teal);letter-spacing:2px;flex:1;}
.nav-date{font-size:11px;color:var(--muted);}
.ham-btn{width:40px;height:40px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--teal);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;}
.overlay.open{display:block;}
.drawer{position:fixed;top:0;right:-300px;width:280px;height:100vh;background:#141414;border-left:1px solid var(--border);z-index:201;transition:right .25s ease;display:flex;flex-direction:column;padding-bottom:32px;}
.drawer.open{right:0;}
.d-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);}
.d-head span{font-size:13px;font-weight:bold;color:var(--teal);}
.d-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;}
.d-item{display:flex;align-items:center;gap:12px;padding:18px 20px;color:var(--text);text-decoration:none;font-size:16px;font-weight:500;border-bottom:1px solid #1e1e1e;cursor:pointer;transition:background .15s;}
.d-item:hover{background:#1e1e1e;}
.d-item svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.d-item.teal{color:var(--teal);}
.d-item.gold{color:var(--gold);}
.d-sec{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:14px 20px 6px;}
.brief{border-bottom:1px solid var(--border);}
.b-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:rgba(61,207,194,.04);border-top:3px solid var(--teal);}
.b-label{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:2px;}
.b-meta{font-size:11px;color:var(--muted);}
.b-content{padding:16px 18px;}
.b-title{font-size:17px;font-weight:700;line-height:1.5;margin-bottom:14px;}
.item-list{display:flex;flex-direction:column;gap:10px;}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
.i-num{font-size:11px;font-weight:700;color:var(--teal);margin-bottom:5px;}
.i-title{font-size:15px;font-weight:600;line-height:1.4;margin-bottom:8px;}
.i-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.i-summary{font-size:14px;color:#ccc;line-height:1.8;margin-bottom:8px;}
.i-shisa{font-size:14px;color:var(--teal);line-height:1.8;margin-bottom:10px;}
.i-src{font-size:12px;color:#555;margin-bottom:10px;}
.i-src a{color:#555;text-decoration:none;}
.u-btns{display:flex;gap:8px;}
.btn-got{flex:1;background:rgba(61,207,194,.08);border:1px solid var(--teal);color:var(--teal);border-radius:8px;padding:10px 0;font-size:14px;font-weight:700;cursor:pointer;}
.btn-got.active{background:rgba(61,207,194,.2);}
.btn-lost{flex:1;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.4);color:#f87171;border-radius:8px;padding:10px 0;font-size:14px;font-weight:700;cursor:pointer;}
.btn-lost.active{background:rgba(239,68,68,.15);}
.u-bar-wrap{display:flex;align-items:center;gap:10px;padding:10px 18px;background:#141414;border-bottom:1px solid var(--border);}
.u-bar-text{font-size:12px;color:var(--muted);white-space:nowrap;}
.u-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.u-bar-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .3s;}
.b-actions{padding:12px 18px;display:flex;gap:8px;border-top:1px solid var(--border);}
.b-act{flex:1;background:var(--card);border:1px solid var(--border);color:#ccc;border-radius:8px;padding:11px 0;font-size:13px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:block;}
.empty{padding:60px 18px;text-align:center;color:var(--muted);font-size:15px;line-height:1.9;}
.empty strong{color:var(--text);display:block;font-size:18px;margin-bottom:8px;}
.todo-ov{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;overflow-y:auto;}
.todo-ov.open{display:block;}
.todo-close{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:#141414;border-bottom:1px solid var(--border);}
.todo-inner{padding:16px 18px;}
.acc-item{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.acc-head{display:flex;align-items:center;gap:10px;padding:16px;cursor:pointer;}
.acc-badge{font-size:10px;padding:2px 8px;border-radius:4px;flex-shrink:0;}
.badge-ceo{background:rgba(212,160,23,.12);color:var(--gold);border:1px solid rgba(212,160,23,.3);}
.badge-auto{background:rgba(61,207,194,.08);color:var(--teal);border:1px solid rgba(61,207,194,.25);}
.acc-title{flex:1;font-size:14px;color:var(--text);font-weight:500;}
.acc-arrow{color:#555;font-size:12px;transition:transform .2s;}
.acc-arrow.open{transform:rotate(180deg);}
.acc-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border);}
.acc-body.open{display:block;}
.acc-ctx{font-size:13px;color:#ccc;line-height:1.9;padding:12px 0 8px;}
.acc-manual{font-size:12px;color:var(--muted);background:#111;border-radius:6px;padding:8px 12px;margin-bottom:10px;}
.acc-btns{display:flex;gap:8px;}
.acc-do{flex:1;background:rgba(61,207,194,.08);border:1px solid var(--teal);color:var(--teal);border-radius:8px;padding:10px 0;font-size:13px;font-weight:700;cursor:pointer;}
.acc-skip{flex:1;background:var(--card);border:1px solid #333;color:var(--muted);border-radius:8px;padding:10px 0;font-size:13px;cursor:pointer;}
</style>
</head>

<main id="main"><div class="empty"><strong id="loadingText"></strong></div></main>
<div class="todo-ov" id="todoOv">
  <div class="todo-close"><span id="todoTitle" style="font-size:15px;font-weight:700;color:var(--gold);"></span><button id="todoClose" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;" onclick="closeTodo()"></button></div>
  <div class="todo-inner" id="todoInner"></div>

<script>
// All Japanese via Unicode escapes - no Japanese in HTML
var T={
  logo:'電脳会社',
  menu:'メニュー',
  ws:'ワークスペース',
  kyun:'自キュン',
  keiba:'競馬',
  merc:'メルカリ',
  kass:'決算城',
  act:'アクション',
  quiz:'今日のクイズ',
  todo:'宿題リスト',
  ext:'外部リンク',
  sell:'出品一覧',
  pcver:'PC版ダッシュボード',
  loading:'読み込み中…',
  news:'今日のインテリジェンス',
  got:'わかった',
  lost:'わからなかった',
  read:'✓ 読了',
  readDone:'✓ 読了済み',
  noNews:'ニュースがまだありません',
  noNewsSub:'「更新して」で収集されます。',
  errTitle:'接続エラー',
  yoyaku:'要約',
  shisa:'示唠',
  ubar:function(g,t,p){return g+'/'+t+' わかった（'+p+'%）';},
  close:'閉じる',
  done_btn:'✓ やった',
  skip_btn:'今はやらない',
  done_all:'✓ 全件対応済み',
  ceo:'CEO',
  auto:'自動'
};

// Set all labels
document.getElementById('logo').textContent=T.logo;
document.getElementById('menuLabel').textContent=T.menu;
document.getElementById('secWS').textContent=T.ws;
document.getElementById('lKyun').textContent=T.kyun;
document.getElementById('lKeiba').textContent=T.keiba;
document.getElementById('lMerc').textContent=T.merc;
document.getElementById('lKass').textContent=T.kass;
document.getElementById('secAct').textContent=T.act;
document.getElementById('lQuiz').textContent=T.quiz;
document.getElementById('lTodo').textContent=T.todo;
document.getElementById('secExt').textContent=T.ext;
document.getElementById('lSell').textContent=T.sell;
document.getElementById('lPC').textContent=T.pcver;
document.getElementById('loadingText').textContent=T.loading;
document.getElementById('todoTitle').textContent=T.todo;
document.getElementById('todoClose').textContent=T.close;
document.title=T.logo;

// Fix quiz link path
document.getElementById('dQuiz').href='./00_ダッシュボード/quiz.html';

document.getElementById('navDate').textContent=
  new Date().toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'})+' '+
  new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});

const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const TODAY=new Date().toISOString().slice(0,10);
const UK='brief_u_'+TODAY;
let bU=JSON.parse(localStorage.getItem(UK)||'{}');
let bItems=[];

function openD(){document.getElementById('ov').classList.add('open');document.getElementById('dr').classList.add('open');}
function closeD(){document.getElementById('ov').classList.remove('open');document.getElementById('dr').classList.remove('open');}
function openTodo(){renderTodo();document.getElementById('todoOv').classList.add('open');}
function closeTodo(){document.getElementById('todoOv').classList.remove('open');}

async function loadBrief(){
  try{
    const{data}=await sb.from('meeting_notes').select('id,date,title,content').eq('category','daily_intelligence_brief').order('date',{ascending:false}).limit(1).maybeSingle();
    if(!data){
      document.getElementById('main').innerHTML='<div class="empty"><strong>'+T.noNews+'</strong>'+T.noNewsSub+'</div>';
      return;
    }
    bItems=parseItems(data.content||'');
    const got=Object.values(bU).filter(v=>v==='got').length,total=bItems.length,pct=total?Math.round(got/total*100):0;
    var html='<div class="brief">'
      +'<div class="b-header"><span class="b-label">'+T.news+'</span><span class="b-meta">'+data.date+'</span></div>'
      +(total>0?'<div class="u-bar-wrap"><span class="u-bar-text" id="uTxt">'+T.ubar(got,total,pct)+'</span><div class="u-bar"><div class="u-bar-fill" id="uFill" style="width:'+pct+'%"></div></div></div>':'')
      +'<div class="b-content"><div class="b-title">'+esc(data.title||'')+'</div>'
      +(total>0?'<div class="item-list">'+bItems.map(renderItem).join('')+'</div>':'<div style="font-size:14px;color:#ccc;line-height:1.9;white-space:pre-wrap;">'+esc((data.content||'').substring(0,800))+'...</div>')
      +'</div>'
      +'<div class="b-actions"><button class="b-act" id="readBtn" onclick="markRead()">'+T.read+'</button></div>'
      +'</div>';
    document.getElementById('main').innerHTML=html;
    restoreU();
  }catch(e){
    document.getElementById('main').innerHTML='<div class="empty"><strong>'+T.errTitle+'</strong><br>'+e.message+'</div>';
  }
}

function esc(s){return(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function parseItems(text){
  var items=[],lines=text.split('\n'),cur=null;
  for(var i=0;i<lines.length;i++){
    var ln=lines[i];
    var m=ln.match(/^「No\.(\d+)」(.+)/)||ln.match(/^【No\.(\d+)】(.+)/);
    if(m){if(cur)items.push(cur);cur={num:m[1],title:m[2].trim(),summary:'',source:'',shisa:''};}
    else if(cur){
      var sm=ln.match(/[-‐・]\s*一言要約[:：]\s*(.+)/),
          so=ln.match(/[-‐・]\s*ソース[:：]\s*(.+)/),
          sh=ln.match(/[-‐・]\s*真平への示唠[:：]\s*(.+)/);
      if(sm)cur.summary=sm[1].trim();
      if(so)cur.source=so[1].trim();
      if(sh)cur.shisa=sh[1].trim();
    }
  }
  if(cur)items.push(cur);
  return items;
}

function renderItem(item){
  var sp=item.source.split('|'),sn=(sp[0]||'').trim(),su=(sp[1]||'').trim();
  var srcH=su?('<a href="'+su+'" target="_blank" rel="noopener">'+sn+' ↗</a>'):sn;
  var st=bU[item.num];
  return '<div class="item-card">'
    +'<div class="i-num">No.'+item.num+'</div>'
    +'<div class="i-title">'+esc(item.title)+'</div>'
    +(item.summary?'<div class="i-lbl">'+T.yoyaku+'</div><div class="i-summary">'+esc(item.summary)+'</div>':'')
    +(item.shisa?'<div class="i-lbl">'+T.shisa+'</div><div class="i-shisa">'+esc(item.shisa)+'</div>':'')
    +(srcH?'<div class="i-src">'+srcH+'</div>':'')
    +'<div class="u-btns">'
    +'<button class="btn-got'+(st==='got'?' active':'')+'" id="mg-'+item.num+'" onclick="markU(\''+item.num+'\',\'got\')">'+T.got+'</button>'
    +'<button class="btn-lost'+(st==='lost'?' active':'')+'" id="ml-'+item.num+'" onclick="markU(\''+item.num+'\',\'lost\')">'+T.lost+'</button>'
    +'</div></div>';
}

function markU(num,val){
  bU[num]=val;localStorage.setItem(UK,JSON.stringify(bU));
  var g=document.getElementById('mg-'+num),l=document.getElementById('ml-'+num);
  if(g)g.classList.toggle('active',val==='got');
  if(l)l.classList.toggle('active',val==='lost');
  var got=Object.values(bU).filter(v=>v==='got').length,pct=bItems.length?Math.round(got/bItems.length*100):0;
  var f=document.getElementById('uFill'),t=document.getElementById('uTxt');
  if(f)f.style.width=pct+'%';
  if(t)t.textContent=T.ubar(got,bItems.length,pct);
}
function restoreU(){Object.entries(bU).forEach(function(e){var g=document.getElementById('mg-'+e[0]),l=document.getElementById('ml-'+e[0]);if(g)g.classList.toggle('active',e[1]==='got');if(l)l.classList.toggle('active',e[1]==='lost');});}
function markRead(){var b=document.getElementById('readBtn');if(b){b.textContent=T.readDone;b.style.color='var(--teal)';b.style.borderColor='var(--teal)';b.disabled=true;}localStorage.setItem('brief_read_'+TODAY,'1');}

var TODO_DATA=[
  {id:'github-token',badge:'CEO',
   title:'GitHub Personal Access Token 取得',
   ctx:'GitHub Pagesでサイトを公開するために必要。1回取得すれば以降は完全自動。',
   manual:'04_手順書/01_GitHub_Token取得.txt（10分）'},
  {id:'a8-rakuten',badge:'CEO',
   title:'A8.net 登録・楽天証券に提携申請',
   ctx:'6/15の¥3,500回収目標の最短ルート。楽天証券CV1件で約4万円。',
   manual:'04_手順書/02_A8net登録.txt（15分）'},
  {id:'kassenjo-sns',badge:'CEO',
   title:'決算城 SNSアカウント取得（X/インスタ/スレッズ）',
   ctx:'名前だけ取っておけばOK（無料・各５分）。取り遅れると他に取られる。',
   manual:'04_手順書/04_SNSアカウント取得_決算城.txt'},
  {id:'kassenjo-articles',badge:'自動',
   title:'決算城 記事002～100作成',
   ctx:'「続きをやって」と言うだけで庵野が代行。青柳さんは何もしなくていい。',
   manual:'「続きをやって」と発言するだけ'},
  {id:'makecom',badge:'自動',
   title:'Make.com スケジュール設定（競馬チーム）',
   ctx:'競馬記事の自動投稿スケジュール設定。庵野が設計書を先出しする。',
   manual:'庵野が設計書を先出しする'}
];

var SKIP_K='todo_skip',DO_K='todo_do';
var skipped=JSON.parse(localStorage.getItem(SKIP_K)||'[]'),doing=JSON.parse(localStorage.getItem(DO_K)||'[]');

function renderTodo(){
  var pending=TODO_DATA.filter(function(t){return skipped.indexOf(t.id)<0;});
  document.getElementById('todoInner').innerHTML=pending.length
    ?pending.map(function(t){
      var bc=t.badge==='CEO'?'badge-ceo':'badge-auto';
      var donePrefix=doing.indexOf(t.id)>=0?'✓ ':'';
      return '<div class="acc-item"><div class="acc-head" onclick="toggleAcc(\''+t.id+'\')">'
        +'<span class="acc-badge '+bc+'">'+t.badge+'</span>'
        +'<span class="acc-title">'+donePrefix+t.title+'</span>'
        +'<span class="acc-arrow" id="tarr-'+t.id+'">▼</span>'
        +'</div>'
        +'<div class="acc-body" id="tbody-'+t.id+'">'
        +'<div class="acc-ctx">'+t.ctx+'</div>'
        +'<div class="acc-manual">📌 '+t.manual+'</div>'
        +'<div class="acc-btns">'
        +'<button class="acc-do" onclick="todoDo(\''+t.id+'\')">'+T.done_btn+'</button>'
        +'<button class="acc-skip" onclick="todoSkip(\''+t.id+'\')">'+T.skip_btn+'</button>'
        +'</div></div></div>';
    }).join('')
    :'<div style="text-align:center;padding:40px;color:#555;font-size:15px;">'+T.done_all+'</div>';
}

function toggleAcc(id){
  var b=document.getElementById('tbody-'+id),a=document.getElementById('tarr-'+id);
  document.querySelectorAll('.acc-body.open').forEach(function(x){x.classList.remove('open');});
  document.querySelectorAll('.acc-arrow.open').forEach(function(x){x.classList.remove('open');});
  b.classList.add('open');a.classList.add('open');
}
function todoDo(id){if(doing.indexOf(id)<0)doing.push(id);localStorage.setItem(DO_K,JSON.stringify(doing));renderTodo();}
function todoSkip(id){if(skipped.indexOf(id)<0)skipped.push(id);localStorage.setItem(SKIP_K,JSON.stringify(skipped));renderTodo();}

loadBrief();
</script>
</body>
</html>
