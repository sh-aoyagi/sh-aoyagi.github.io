<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #0f0f0f; --card: #1a1a1a; --border: #2a2a2a;
  --text: #ffffff; --muted: #888; --teal: #3DCFC2; --gold: #d4a017; --red: #ef4444;
}
html, body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', 'Noto Sans JP', sans-serif; min-height: 100vh; }
.nav { position: sticky; top: 0; z-index: 100; background: rgba(15,15,15,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); height: 52px; display: flex; align-items: center; padding: 0 18px; gap: 12px; }
.nav-logo { font-size: 15px; font-weight: 700; color: var(--teal); letter-spacing: 2px; flex: 1; }
.nav-date { font-size: 11px; color: var(--muted); }
.ham-btn { width: 40px; height: 40px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--teal); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; }
.overlay.open { display: block; }
.drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100vh; background: #141414; border-left: 1px solid var(--border); z-index: 201; transition: right .25s ease; display: flex; flex-direction: column; padding-bottom: 32px; }
.drawer.open { right: 0; }
.drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); }
.drawer-head span { font-size: 13px; font-weight: bold; color: var(--teal); letter-spacing: 1px; }
.close-btn { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
.drawer-item { display: flex; align-items: center; gap: 12px; padding: 18px 20px; color: var(--text); text-decoration: none; font-size: 16px; font-weight: 500; border-bottom: 1px solid #1e1e1e; cursor: pointer; transition: background .15s; }
.drawer-item:hover { background: #1e1e1e; }
.drawer-item svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.drawer-item.teal { color: var(--teal); }
.drawer-item.gold { color: var(--gold); }
.drawer-section { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; padding: 14px 20px 6px; }
.main { padding: 0; }
.brief { border-bottom: 1px solid var(--border); }
.brief-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); background: rgba(61,207,194,0.04); border-top: 3px solid var(--teal); }
.brief-header .label { font-size: 11px; font-weight: 700; color: var(--teal); letter-spacing: 2px; text-transform: uppercase; }
.brief-header .meta { font-size: 11px; color: var(--muted); }
.brief-content { padding: 16px 18px; }
.brief-title { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.5; margin-bottom: 14px; }
.item-list { display: flex; flex-direction: column; gap: 10px; }
.item-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.item-num { font-size: 11px; font-weight: 700; color: var(--teal); margin-bottom: 5px; }
.item-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 8px; }
.item-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.item-summary { font-size: 14px; color: #ccc; line-height: 1.8; margin-bottom: 8px; }
.item-shisa { font-size: 14px; color: var(--teal); line-height: 1.8; margin-bottom: 10px; }
.item-src { font-size: 12px; color: #555; margin-bottom: 10px; }
.item-src a { color: #555; text-decoration: none; }
.understand-btns { display: flex; gap: 8px; }
.btn-got { flex: 1; background: rgba(61,207,194,0.08); border: 1px solid var(--teal); color: var(--teal); border-radius: 8px; padding: 10px 0; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-got.active { background: rgba(61,207,194,0.2); }
.btn-lost { flex: 1; background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.4); color: #f87171; border-radius: 8px; padding: 10px 0; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-lost.active { background: rgba(239,68,68,0.15); }
.u-bar-wrap { display: flex; align-items: center; gap: 10px; padding: 10px 18px; background: #141414; border-bottom: 1px solid var(--border); }
.u-bar-text { font-size: 12px; color: var(--muted); white-space: nowrap; }
.u-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.u-bar-fill { height: 100%; background: var(--teal); border-radius: 2px; transition: width .3s; }
.brief-actions { padding: 12px 18px; display: flex; gap: 8px; border-top: 1px solid var(--border); }
.brief-act-btn { flex: 1; background: var(--card); border: 1px solid var(--border); color: #ccc; border-radius: 8px; padding: 11px 0; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; display: block; transition: all .15s; }
.brief-act-btn:hover { border-color: var(--teal); color: var(--teal); }
.empty { padding: 60px 18px; text-align: center; color: var(--muted); font-size: 15px; line-height: 1.9; }
.empty strong { color: var(--text); display: block; font-size: 18px; margin-bottom: 8px; }
.todo-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 300; overflow-y: auto; }
.todo-overlay.open { display: block; }
.todo-close { position: sticky; top: 0; display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; background: #141414; border-bottom: 1px solid var(--border); z-index: 1; }
.todo-close span { font-size: 15px; font-weight: 700; color: var(--gold); }
.todo-close button { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
.todo-inner { padding: 16px 18px; }
.acc-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
.acc-head { display: flex; align-items: center; gap: 10px; padding: 16px; cursor: pointer; }
.acc-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
.badge-ceo { background: rgba(212,160,23,0.12); color: var(--gold); border: 1px solid rgba(212,160,23,0.3); }
.badge-auto { background: rgba(61,207,194,0.08); color: var(--teal); border: 1px solid rgba(61,207,194,0.25); }
.acc-head-title { flex: 1; font-size: 14px; color: var(--text); font-weight: 500; }
.acc-arrow { color: #555; font-size: 12px; transition: transform .2s; }
.acc-arrow.open { transform: rotate(180deg); }
.acc-body { display: none; padding: 0 16px 14px; border-top: 1px solid var(--border); }
.acc-body.open { display: block; }
.acc-context { font-size: 13px; color: #ccc; line-height: 1.9; padding: 12px 0 8px; }
.acc-manual { font-size: 12px; color: var(--muted); background: #111; border-radius: 6px; padding: 8px 12px; margin-bottom: 10px; }
.acc-btns { display: flex; gap: 8px; }
.acc-btn-do { flex: 1; background: rgba(61,207,194,0.08); border: 1px solid var(--teal); color: var(--teal); border-radius: 8px; padding: 10px 0; font-size: 13px; font-weight: 700; cursor: pointer; }
.acc-btn-skip { flex: 1; background: var(--card); border: 1px solid #333; color: var(--muted); border-radius: 8px; padding: 10px 0; font-size: 13px; cursor: pointer; }
</style>
</head>

<main class="main" id="mainContent"><div class="empty"><strong>読み込み中…</strong></div></main>

<div class="todo-overlay" id="todoOverlay">
  <div class="todo-close"><span>宿題リスト</span><button onclick="closeTodo()">閉じる</button></div>
  <div class="todo-inner" id="todoInner"></div>
</div>

<script>
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const TODAY = new Date().toISOString().slice(0,10);
const U_KEY = 'brief_u_' + TODAY;
let briefU = JSON.parse(localStorage.getItem(U_KEY) || '{}');
let briefItems = [];

document.getElementById('navDate').textContent =
  new Date().toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'}) + ' ' +
  new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});

function openDrawer(){document.getElementById('overlay').classList.add('open');document.getElementById('drawer').classList.add('open');}
function closeDrawer(){document.getElementById('overlay').classList.remove('open');document.getElementById('drawer').classList.remove('open');}
function openTodo(){renderTodo();document.getElementById('todoOverlay').classList.add('open');}
function closeTodo(){document.getElementById('todoOverlay').classList.remove('open');}

async function loadBrief() {
  try {
    const {data} = await sb.from('meeting_notes').select('id,date,title,content').eq('category','daily_intelligence_brief').order('date',{ascending:false}).limit(1).maybeSingle();
    if (!data) { document.getElementById('mainContent').innerHTML='<div class="empty"><strong>ニュースがまだありません</strong>「更新して」で収集されます。</div>'; return; }
    briefItems = parseItems(data.content||'');
    const got=Object.values(briefU).filter(v=>v==='got').length, total=briefItems.length, pct=total?Math.round(got/total*100):0;
    document.getElementById('mainContent').innerHTML=`
      <div class="brief">
        <div class="brief-header"><span class="label">今日のインテリジェンス</span><span class="meta">${data.date}</span></div>
        ${total>0?`<div class="u-bar-wrap"><span class="u-bar-text">${got}/${total} わかった（${pct}%）</span><div class="u-bar"><div class="u-bar-fill" id="uFill" style="width:${pct}%"></div></div></div>`:''}
        <div class="brief-content">
          <div class="brief-title">${(data.title||'').replace(/</g,'&lt;')}</div>
          ${total>0?`<div class="item-list">${briefItems.map(renderItem).join('')}</div>`:`<div style="font-size:14px;color:#ccc;line-height:1.9;white-space:pre-wrap;">${(data.content||'').substring(0,800).replace(/</g,'&lt;')}…</div>`}
        </div>
        <div class="brief-actions"><button class="brief-act-btn" onclick="markRead()" id="readBtn">✓ 読了</button></div>
      </div>`;
    restoreU();
  } catch(e) { document.getElementById('mainContent').innerHTML='<div class="empty"><strong>接続エラー</strong><br>'+e.message+'</div>'; }
}

function parseItems(text) {
  const items=[],lines=text.split('\n');let cur=null;
  for(const ln of lines){const m=ln.match(/^【No\.(\d+)】(.+)/);if(m){if(cur)items.push(cur);cur={num:m[1],title:m[2].trim(),summary:'',source:'',shisa:''};}else if(cur){const sm=ln.match(/^[-‐・]\s*一言要約[:：]\s*(.+)/),so=ln.match(/^[-‐・]\s*ソース[:：]\s*(.+)/),sh=ln.match(/^[-‐・]\s*真平への示唆[:：]\s*(.+)/);if(sm)cur.summary=sm[1].trim();if(so)cur.source=so[1].trim();if(sh)cur.shisa=sh[1].trim();}}
  if(cur)items.push(cur);return items;
}

function renderItem(item){
  const sp=item.source.split('|'),sn=sp[0]?.trim()||'',su=sp[1]?.trim()||'';
  const srcH=su?`<a href="${su}" target="_blank" rel="noopener">${sn} ↗</a>`:sn;
  const st=briefU[item.num];
  return `<div class="item-card"><div class="item-num">No.${item.num}</div><div class="item-title">${item.title.replace(/</g,'&lt;')}</div>${item.summary?`<div class="item-lbl">要約</div><div class="item-summary">${item.summary.replace(/</g,'&lt;')}</div>`:''}${item.shisa?`<div class="item-lbl">示唆</div><div class="item-shisa">${item.shisa.replace(/</g,'&lt;')}</div>`:''}${srcH?`<div class="item-src">${srcH}</div>`:''}<div class="understand-btns"><button class="btn-got${st==='got'?' active':''}" id="mg-${item.num}" onclick="markU('${item.num}','got')">わかった</button><button class="btn-lost${st==='lost'?' active':''}" id="ml-${item.num}" onclick="markU('${item.num}','lost')">わからなかった</button></div></div>`;
}

function markU(num,val){briefU[num]=val;localStorage.setItem(U_KEY,JSON.stringify(briefU));document.getElementById('mg-'+num)?.classList.toggle('active',val==='got');document.getElementById('ml-'+num)?.classList.toggle('active',val==='lost');const got=Object.values(briefU).filter(v=>v==='got').length,pct=briefItems.length?Math.round(got/briefItems.length*100):0;const f=document.getElementById('uFill'),t=document.querySelector('.u-bar-text');if(f)f.style.width=pct+'%';if(t)t.textContent=`${got}/${briefItems.length} わかった（${pct}%）`;}
function restoreU(){Object.entries(briefU).forEach(([n,v])=>{document.getElementById('mg-'+n)?.classList.toggle('active',v==='got');document.getElementById('ml-'+n)?.classList.toggle('active',v==='lost');});}
function markRead(){const btn=document.getElementById('readBtn');if(btn){btn.textContent='✓ 読了済み';btn.style.color='var(--teal)';btn.style.borderColor='var(--teal)';btn.disabled=true;}localStorage.setItem('brief_read_'+TODAY,'1');}

const TODO_DATA=[
  {id:'github-token',badge:'CEO',title:'GitHub Personal Access Token 取得',context:'GitHub Pagesでサイトを公開するために必要。1回取得すれば以降は完全自動。',manual:'04_手順書/01_GitHub_Token取得.txt（約10分）'},
  {id:'a8-rakuten',badge:'CEO',title:'A8.net 登録・楽天証券に提携申請',context:'6/15の¥3,500回収目標の最短ルート。楽天証券CV1件で約¥3,000。',manual:'04_手順書/02_A8net登録.txt（約15分）'},
  {id:'kassenjo-sns',badge:'CEO',title:'決算城 SNSアカウント取得（X/インスタ/スレッズ）',context:'名前だけ取っておけばOK（無料・各5分）。取り遅れると他に取られる。',manual:'04_手順書/04_SNSアカウント取得_決算城.txt'},
  {id:'kassenjo-articles',badge:'自動',title:'決算城 記事002〜100作成',context:'「続きをやって」と言うだけで庵野が代行。青柳さんは何もしなくていい。',manual:'「続きをやって」と発言するだけ'},
  {id:'makecom',badge:'自動',title:'Make.com スケジュール設定（競馬チーム）',context:'競馬記事の自動投稿スケジュール設定。庵野が設計書を作ってから着手。',manual:'庵野が設計書を先出しする'}
];
const SKIP_KEY='todo_skip',DO_KEY='todo_do';
const skipped=JSON.parse(localStorage.getItem(SKIP_KEY)||'[]'),doing=JSON.parse(localStorage.getItem(DO_KEY)||'[]');

function renderTodo(){const pending=TODO_DATA.filter(t=>!skipped.includes(t.id));document.getElementById('todoInner').innerHTML=pending.length?pending.map(t=>`<div class="acc-item" id="tacc-${t.id}"><div class="acc-head" onclick="toggleAcc('${t.id}')"><span class="acc-badge ${t.badge==='CEO'?'badge-ceo':'badge-auto'}">${t.badge}</span><span class="acc-head-title">${doing.includes(t.id)?'✓ ':''}${t.title}</span><span class="acc-arrow" id="tarr-${t.id}">▼</span></div><div class="acc-body" id="tbody-${t.id}"><div class="acc-context">${t.context}</div><div class="acc-manual">📌 ${t.manual}</div><div class="acc-btns"><button class="acc-btn-do" onclick="todoDo('${t.id}')">✓ やった</button><button class="acc-btn-skip" onclick="todoSkip('${t.id}')">今はやらない</button></div></div></div>`).join(''):'<div style="text-align:center;padding:40px;color:#555;font-size:15px;">✓ 全件対応済み</div>';}
function toggleAcc(id){const b=document.getElementById('tbody-'+id),a=document.getElementById('tarr-'+id);document.querySelectorAll('.acc-body.open').forEach(x=>x.classList.remove('open'));document.querySelectorAll('.acc-arrow.open').forEach(x=>x.classList.remove('open'));b.classList.add('open');a.classList.add('open');}
function todoDo(id){if(!doing.includes(id))doing.push(id);localStorage.setItem(DO_KEY,JSON.stringify(doing));renderTodo();}
function todoSkip(id){if(!skipped.includes(id))skipped.push(id);localStorage.setItem(SKIP_KEY,JSON.stringify(skipped));renderTodo();}

loadBrief();
</script>
</body>
