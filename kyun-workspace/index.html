* { margin: 0; padding: 0; box-sizing: border-box; }

<script>
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const TODAY = new Date().toISOString().slice(0,10);
const ARCHIVE_KEY = 'kyun_archive';
const TODAY_DONE_KEY = 'kyun_done_' + TODAY;

let allStories = [];
let todayDone = JSON.parse(localStorage.getItem(TODAY_DONE_KEY) || '[]');

function getArchive() {
  const raw = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]');
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 14);
  return raw.filter(a => new Date(a.date) >= cutoff);
}

function saveArchive(items) {
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(items));
}

async function init() {
  try {
    const [draftRes, pubRes, allPubRes] = await Promise.all([
      sb.from('note_articles')
        .select('id,article_no,title,free_content,paid_content,cover_image_prompt,tags,status,note_url,price')
        .eq('category', '自キュン').eq('status', 'draft').order('article_no', { ascending: true }),
      sb.from('note_articles').select('id',{count:'exact',head:true}).eq('category','自キュン').eq('status','published'),
      sb.from('note_articles').select('title').eq('category','自キュン').eq('status','published')
    ]);
    if (draftRes.error) throw draftRes.error;

    allStories = (draftRes.data || []).filter(s => !todayDone.includes(s.id));
    const pubCount = pubRes.count || 0;
    const grandTotal = (draftRes.data||[]).length + pubCount;

    // シリーズ番号の抜け検知
    checkSeriesGap(allPubRes.data || [], grandTotal);

    document.getElementById('progCount').textContent = grandTotal + ' / 100本';
    document.getElementById('progFill').style.width = Math.min(grandTotal, 100) + '%';
    updateTodayCount();
    renderCards();
    renderArchive();

    document.getElementById('connBadge').textContent = '✓ ' + grandTotal + '本';
    document.getElementById('connBadge').className = 'conn-badge ok';
  } catch(e) {
    document.getElementById('connBadge').textContent = 'エラー: ' + e.message.slice(0,25);
    document.getElementById('connBadge').className = 'conn-badge err';
  }
}

function checkSeriesGap(pubTitles, total) {
  const nums = pubTitles
    .map(a => { const m = (a.title||'').match(/シリーズ(\d+)/); return m ? parseInt(m[1]) : null; })
    .filter(n => n !== null).sort((a,b) => a-b);
  const maxNum = nums.length ? Math.max(...nums) : 0;
  const missing = [];
  for (let i = 1; i <= maxNum; i++) { if (!nums.includes(i)) missing.push(String(i).padStart(2,'0')); }
  const el = document.getElementById('seriesAlert');
  if (!el) return;
  if (missing.length > 0) {
    el.style.display = 'block';
    el.innerHTML = `⚠️ note未確認の話: <strong>Series ${missing.join(', ')}</strong>　— 公開確認してください`;
  } else if (total > 0) {
    el.style.display = 'block';
    el.style.background = 'rgba(34,197,94,0.08)';
    el.style.borderColor = '#22c55e';
    el.style.color = '#22c55e';
    el.innerHTML = `✓ Series 01〜${String(maxNum).padStart(2,'0')} 抜けなし（${total}本）`;
  }
}

function updateTodayCount() {
  const done = todayDone.length;
  const total = allStories.length + done;
  document.getElementById('progToday').textContent = `今日 ${done}/${total}本`;
  if (total > 0 && done >= total) {
    document.getElementById('completedBanner').style.display = 'block';
  }
}

function renderCards() {
  const row = document.getElementById('cardsRow');
  const pending = allStories.slice(0, 4);
  if (!pending.length && todayDone.length >= 1) {
    row.innerHTML = '';
    return;
  }
  if (!pending.length) {
    row.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);font-size:13px;">記事がありません。庵野に追加を依頼してください。</div>';
    return;
  }
  row.innerHTML = pending.map((s, i) => cardHTML(s, i)).join('');
}

function splitBody(free, paid) {
  // 各ブロック最大500文字、6ブロックに分割（⑥はオーバーフロー用）
  const SEG = 500;
  const full = [free, paid].filter(Boolean).join('\n\n');
  const blocks = [];
  for (let i = 0; i < 6; i++) {
    blocks.push(full.slice(i * SEG, (i + 1) * SEG).trim());
  }
  return blocks;
}

const FIELD_DATA = {};
function buildFieldData(s) {
  FIELD_DATA[s.id] = {
    img: s.chatgpt_image_prompt || '',
    title: s.title || '',
    body: (s.free_text||'') + (s.paid_text ? '\n\n---有料---\n'+s.paid_text : ''),
    tags: [s.persona,s.emotion_type,s.era].filter(Boolean).join(' ') || '自キュン 恋愛小説'
  };
}

async function dismiss(id, encodedTitle) {
  const el = document.getElementById('sc-' + id);
  if (!el) return;
  const title = decodeURIComponent(encodedTitle);

  el.classList.add('fading');
  setTimeout(async () => {
    // note_articles を published に更新（UUID）
    await sb.from('note_articles').update({ status: 'published' }).eq('id', id).catch(()=>{});

    // localStorage
    todayDone.push(id);
    localStorage.setItem(TODAY_DONE_KEY, JSON.stringify(todayDone));
    allStories = allStories.filter(s => s.id !== id);

    // アーカイブ
    const arch = getArchive();
    arch.push({ id, title, date: TODAY, wasPublished: true });
    saveArchive(arch);

    updateTodayCount();
    renderCards();
    renderArchive();
  }, 300);
}

function fc(id, field, btn) {
  const el = document.getElementById('f-' + field + '-' + id);
  if (!el || el.classList.contains('empty')) return;
  const text = el.tagName === 'TEXTAREA' ? el.value : el.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('done'); }, 1500);
  });
}

function renderArchive() {
  const arch = getArchive();
  document.getElementById('archiveCount').textContent = arch.length;
  const list = document.getElementById('archiveList');
  if (!arch.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px 0;">アーカイブなし</div>';
    return;
  }
  list.innerHTML = [...arch].reverse().map(a =>
    `<div class="archive-item">
      <span class="archive-title">✓ ${a.title}</span>
      <span class="archive-date">${a.date}</span>
    </div>`
  ).join('');
}

function toggleArchive() {
  const list = document.getElementById('archiveList');
  const arrow = document.getElementById('archiveArrow');
  const isOpen = list.classList.contains('open');
  list.classList.toggle('open');
  arrow.textContent = isOpen ? '▶' : '▼';
}

function copyMake(no, type, btn) {
  const s = MAKE_SERIES.find(x => x.no === no);
  if (!s) return;
  const text = type === 'xml'
    ? s.xml
    : SKILL_PATH + '\n\n上記 SKILL.md を読んでから、以下のパラメータで制作してください：\n\n' + s.xml;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ コピー済';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('done'); }, 1600);
  });
}
