<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --bg2: #141414; --bg3: #1a1a1a;
  --border: #2a2a2a; --text: #e8e0d0; --muted: #b0a898;
  --gold: #d4a017; --green: #22c55e; --keiba: #f97316;
}
body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI','Noto Sans JP',sans-serif; min-height: 100vh; }
.nav-ic { width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; vertical-align:middle; flex-shrink:0; }
.gnav-links a,.nav-item { display:flex; align-items:center; gap:8px; }
/* NAV */
.gnav { background:#141414; border-bottom:1px solid #2a2a2a; display:flex; align-items:center; gap:2px; padding:0 16px; height:48px; position:sticky; top:0; z-index:500; }
.gnav-logo { font-size:13px; font-weight:bold; color:#fff; letter-spacing:2px; margin-right:10px; white-space:nowrap; flex-shrink:0; }
.gnav-links { display:flex; gap:2px; flex:1; }
.gnav-links a { color:#777; text-decoration:none; padding:6px 12px; border-radius:6px; font-size:12px; font-weight:bold; transition:all .15s; white-space:nowrap; }
.gnav-links a:hover { background:#1a1a1a; color:#fff; }
.gnav-links a.active { color:#f97316; background:rgba(249,115,22,0.09); }
.gnav-ham { display:none; background:none; border:1px solid #2a2a2a; border-radius:5px; padding:4px 9px; color:#d4a017; font-size:16px; cursor:pointer; flex-shrink:0; margin-left:auto; }
@media (max-width:768px) { .gnav-links { display:none; } .gnav-ham { display:block; } }
.nav-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:600; }
.nav-overlay.open { display:block; }
.nav-sidebar { position:fixed; top:0; left:-280px; width:280px; height:100vh; background:#0f0f0f; border-right:1px solid #2a2a2a; z-index:700; transition:left .22s; padding:20px 0; }
.nav-sidebar.open { left:0; }
.nav-x { position:absolute; top:14px; right:14px; cursor:pointer; color:#b0a898; font-size:18px; }
.nav-head { padding:0 18px 16px; border-bottom:1px solid #2a2a2a; font-size:13px; font-weight:bold; color:#f97316; letter-spacing:2px; }
.nav-item { display:flex !important; align-items:center; gap:8px; padding:14px 18px; color:#ddd; text-decoration:none; border-bottom:1px solid #1c1c1c; font-size:14px; transition:background .15s; }
.nav-item:hover { background:#1a1a1a; }
.nav-item.active { color:#f97316; border-left:3px solid #f97316; padding-left:15px !important; }
/* PROGRESS BAR */
.progress-bar-wrap { background:#141414; border-bottom:1px solid #2a2a2a; padding:10px 20px; display:flex; align-items:center; gap:16px; }
.prog-label { font-size:12px; color:#b0a898; white-space:nowrap; }
.prog-bar { flex:1; height:6px; background:#2a2a2a; border-radius:3px; overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,#c05c00,#f97316); border-radius:3px; transition:width .6s; }
.prog-count { font-size:13px; font-weight:bold; color:#f97316; white-space:nowrap; }
.prog-today { font-size:12px; color:#22c55e; white-space:nowrap; }
.conn-badge { font-size:11px; padding:2px 8px; border-radius:10px; background:#1a1a1a; border:1px solid #2a2a2a; color:#b0a898; flex-shrink:0; }
.conn-badge.ok { color:#22c55e; border-color:rgba(34,197,94,0.3); background:rgba(34,197,94,0.08); }
.conn-badge.err { color:#f87171; border-color:#4a1a1a; background:#2a0d0d; }
/* RACE MINI HEADER */
.race-header { background:linear-gradient(90deg,#1a0800,#0f0f0f); border-bottom:1px solid #3a1a00; padding:10px 20px; display:flex; align-items:center; gap:14px; }
.race-grade-tag { font-size:10px; font-weight:bold; color:#f97316; background:rgba(249,115,22,0.1); border:1px solid rgba(249,115,22,0.3); border-radius:8px; padding:2px 8px; flex-shrink:0; }
.race-name-sm { font-size:14px; font-weight:bold; color:#fff; }
.race-meta-sm { font-size:11px; color:#b0a898; flex:1; }
/* WEEKLY CALENDAR STRIP */
.cal-strip { background:#141414; border-bottom:1px solid #2a2a2a; display:grid; grid-template-columns:repeat(7,1fr); }
.cal-cell { padding:6px 4px; text-align:center; border-right:1px solid #2a2a2a; }
.cal-cell:last-child { border-right:none; }
.cal-cell-day { font-size:9px; color:#666; margin-bottom:3px; }
.cal-cell-task { font-size:9px; color:#555; line-height:1.3; }
.cal-cell-task.active { color:#f97316; font-weight:bold; }
.cal-cell.today-col { background:#1a0800; border-top:2px solid #f97316; }
/* COMPLETED STATE */
.completed-banner { background:linear-gradient(135deg,#0d2a19,#1a3a0a); border:1px solid #22c55e; border-radius:12px; padding:32px; text-align:center; margin-bottom:20px; }
.completed-icon { font-size:48px; margin-bottom:12px; }
.completed-title { font-size:22px; font-weight:bold; color:#22c55e; margin-bottom:6px; }
.completed-sub { font-size:13px; color:#b0a898; }
/* MAIN */
.main { padding:16px 20px; }
/* 2-COLUMN CARDS */
.cards-row { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:20px; }
@media (max-width:900px) { .cards-row { grid-template-columns:1fr; } }
.story-card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; overflow:hidden; display:flex; flex-direction:column; transition:opacity .3s,transform .3s; }
.story-card.fading { opacity:0; transform:scale(0.95); }
.card-num { font-size:10px; font-weight:bold; color:#f97316; background:rgba(249,115,22,0.08); padding:5px 14px; border-bottom:1px solid #2a2a2a; display:flex; justify-content:space-between; align-items:center; }
.card-story-title { font-size:12px; font-weight:bold; color:#e8e0d0; padding:10px 12px 6px; line-height:1.5; }
/* FIELD BLOCKS */
.field-block { border-top:1px solid #2a2a2a; }
.field-head { display:flex; align-items:center; justify-content:space-between; padding:6px 10px; background:#141414; }
.field-label { font-size:10px; font-weight:bold; color:#b0a898; letter-spacing:.5px; }
.field-copy-btn { background:#f97316; color:#000; border:none; border-radius:6px; padding:3px 10px; font-size:10px; font-weight:bold; cursor:pointer; transition:all .15s; white-space:nowrap; }
.field-copy-btn:hover { background:#ea6c0a; }
.field-copy-btn.done { background:#22c55e; }
.field-body { padding:6px 10px; font-size:11px; color:#d0c8bc; line-height:1.6; max-height:90px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; }
.field-body.tall { max-height:160px; }
.field-body.empty { color:#b0a898; font-style:italic; }
textarea.field-body { width:100%; background:#111; border:none; resize:none; font-family:inherit; outline:none; }
textarea.field-body:focus { background:#141414; }
/* DISMISS BUTTON */
.dismiss-btn { margin:10px 12px 12px; background:rgba(249,115,22,0.06); border:1px solid #f97316; color:#f97316; border-radius:7px; padding:8px 0; font-size:12px; font-weight:bold; cursor:pointer; width:calc(100% - 24px); transition:all .15s; }
.dismiss-btn:hover { background:rgba(249,115,22,0.15); }
/* ARCHIVE */
.archive-toggle { font-size:12px; color:#b0a898; cursor:pointer; padding:6px 0; display:flex; align-items:center; gap:6px; user-select:none; }
.archive-toggle:hover { color:#e8e0d0; }
.archive-list { margin-top:10px; display:none; }
.archive-list.open { display:block; }
.archive-item { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:6px; padding:8px 12px; margin-bottom:6px; display:flex; align-items:center; justify-content:space-between; }
.archive-title { font-size:12px; color:#b0a898; }
.archive-date { font-size:10px; color:#555; }
</style>

<script>
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const TODAY = new Date().toISOString().slice(0,10);
const WEEK_DONE_KEY = 'keiba_done_' + getWeekKey();
const ARCHIVE_KEY = 'keiba_archive';

let allArticles = [];
let weekDone = JSON.parse(localStorage.getItem(WEEK_DONE_KEY) || '[]');

function getWeekKey() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(d.setDate(diff));
  return mon.toISOString().slice(0,10);
}

function getArchive() {
  const raw = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]');
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 28);
  return raw.filter(a => new Date(a.date) >= cutoff);
}
function saveArchive(items) { localStorage.setItem(ARCHIVE_KEY, JSON.stringify(items)); }

// カレンダー描画
function renderCalendar() {
  const days = ['月','火','水','木','金','土','日'];
  const tasks = ['','','予想記事\n¥100','本命系\n無料','血統系\n無料','追い切り\n速報追記','レース当日'];
  const todayIdx = (new Date().getDay() + 6) % 7;
  document.getElementById('calStrip').innerHTML = days.map((d,i) => {
    const isToday = i === todayIdx;
    const hasTask = tasks[i].length > 0;
    return `<div class="cal-cell${isToday?' today-col':''}">
      <div class="cal-cell-day">${d}</div>
      <div class="cal-cell-task${hasTask?' active':''}">${tasks[i].replace('\n','<br>') || '─'}</div>
    </div>`;
  }).join('');
}

async function init() {
  renderCalendar();
  try {
    const { data, error } = await sb
      .from('note_articles')
      .select('id,article_no,title,free_content,paid_content,cover_image_prompt,tags,status,price')
      .eq('category', '競馬')
      .neq('status', 'published')
      .order('article_no', { ascending: true });
    if (error) throw error;

    allArticles = (data || []).filter(a => !weekDone.includes(a.id));
    const pubCount = (await sb.from('note_articles').select('id',{count:'exact',head:true}).eq('category','競馬').eq('status','published')).count || 0;
    const totalDone = weekDone.length;

    document.getElementById('progCount').textContent = pubCount + ' / 累計本';
    document.getElementById('progFill').style.width = Math.min(totalDone / 2 * 100, 100) + '%';
    updateWeekCount();
    renderCards();
    renderArchive();

    document.getElementById('connBadge').textContent = '✓ 計' + pubCount + '本';
    document.getElementById('connBadge').className = 'conn-badge ok';
  } catch(e) {
    document.getElementById('connBadge').textContent = 'エラー: ' + e.message.slice(0,25);
    document.getElementById('connBadge').className = 'conn-badge err';
  }
}

function updateWeekCount() {
  const done = weekDone.length;
  document.getElementById('progToday').textContent = `今週 ${done}/2本`;
  if (done >= 2) document.getElementById('completedBanner').style.display = 'block';
}

function renderCards() {
  const row = document.getElementById('cardsRow');
  const pending = allArticles.slice(0, 2);
  if (!pending.length && weekDone.length >= 2) { row.innerHTML = ''; return; }
  if (!pending.length) {
    row.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#b0a898;font-size:13px;">記事がありません。庵野に追加を依頼してください。</div>';
    return;
  }
  row.innerHTML = pending.map((a, i) => cardHTML(a, i)).join('');
}

function kBtn(color, label, onclick) {
  return `<button class="field-copy-btn" style="background:${color};color:#000;" onclick="${onclick}">${label}</button>`;
}

function cardHTML(a, i) {
  const num = weekDone.length + i + 1;
  const imgP = a.cover_image_prompt || '';
  const title = a.title || '';
  const tagsArr = Array.isArray(a.tags) ? a.tags : (typeof a.tags === 'string' ? a.tags.split(',') : []);
  const tags = tagsArr.join(' ') || '競馬予想 FIREスコア 安田記念';
  const price = a.price || 100;
  const free = a.free_content || '';
  const paid = a.paid_content || '';

  return `<div class="story-card" id="sc-${a.id}">
    <div class="card-num">
      <span>今週 ${num}本目</span>
      <span>¥${price}</span>
    </div>
    <div class="card-story-title">${title || '（タイトルなし）'}</div>

    <div class="field-block">
      <div class="field-head">
        <span class="field-label">① TOP画像プロンプト</span>
        <div style="display:flex;gap:5px;align-items:center;">
          <a href="https://gemini.google.com/app" target="_blank" style="font-size:9px;color:#b0a898;text-decoration:none;border:1px solid #2a2a2a;border-radius:8px;padding:2px 6px;">Gemini↗</a>
          ${kBtn('#f97316','TOP用コピー',`fc('${a.id}','img',this)`)}
        </div>
      </div>
      <textarea class="field-body ${imgP?'':'empty'}" id="f-img-${a.id}" rows="3">${imgP||'（なし）'}</textarea>
    </div>

    <div class="field-block">
      <div class="field-head"><span class="field-label">② タイトル</span>${kBtn('#f5eb62','タイトルコピー',`fc('${a.id}','title',this)`)}</div>
      <textarea class="field-body ${title?'':'empty'}" id="f-title-${a.id}" rows="2">${title||'（なし）'}</textarea>
    </div>

    <div class="field-block">
      <div class="field-head"><span class="field-label">③ 無料パート（全文）</span>${kBtn('#376aed','無料コピー',`fc('${a.id}','free',this)`)}</div>
      <textarea class="field-body tall ${free?'':'empty'}" id="f-free-${a.id}" style="min-height:160px;">${free||'（なし）'}</textarea>
    </div>

    <div class="field-block">
      <div class="field-head"><span class="field-label">④ 有料パート（全文）</span>${kBtn('#f255b6','有料コピー',`fc('${a.id}','paid',this)`)}</div>
      <textarea class="field-body tall ${paid?'':'empty'}" id="f-paid-${a.id}" style="min-height:160px;">${paid||'（なし）'}</textarea>
    </div>

    <div class="field-block">
      <div class="field-head"><span class="field-label">⑤ タグ</span>${kBtn('#f5eb62','タグコピー',`fc('${a.id}','tags',this)`)}</div>
      <textarea class="field-body ${tags?'':'empty'}" id="f-tags-${a.id}" rows="2">${tags}</textarea>
    </div>

    <button class="dismiss-btn" onclick="dismiss('${a.id}','${encodeURIComponent(title)}')">✓ note投稿済み（消込）</button>
  </div>`;
}

function fc(id, field, btn) {
  const el = document.getElementById('f-' + field + '-' + id);
  if (!el || el.classList.contains('empty')) return;
  navigator.clipboard.writeText(el.value).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('done'); }, 1500);
  });
}

async function dismiss(id, encodedTitle) {
  const el = document.getElementById('sc-' + id);
  if (!el) return;
  const title = decodeURIComponent(encodedTitle);
  el.classList.add('fading');
  setTimeout(async () => {
    await sb.from('note_articles').update({ status: 'published' }).eq('id', id).catch(()=>{});
    weekDone.push(id);
    localStorage.setItem(WEEK_DONE_KEY, JSON.stringify(weekDone));
    allArticles = allArticles.filter(a => a.id !== id);
    const arch = getArchive();
    arch.push({ id, title, date: TODAY });
    saveArchive(arch);
    updateWeekCount();
    renderCards();
    renderArchive();
  }, 300);
}

function renderArchive() {
  const arch = getArchive();
  document.getElementById('archiveCount').textContent = arch.length;
  const list = document.getElementById('archiveList');
  if (!arch.length) {
    list.innerHTML = '<div style="font-size:12px;color:#b0a898;padding:8px 0;">アーカイブなし</div>';
    return;
  }
  list.innerHTML = [...arch].reverse().map(a =>
    `<div class="archive-item">
      <span class="archive-title">✓ ${a.title}</span>
      <span class="archive-date">${a.date}</span>
    </div>`
  ).join('');
}

function toggleArchive() {
  const list = document.getElementById('archiveList');
  const arrow = document.getElementById('archiveArrow');
  const isOpen = list.classList.contains('open');
  list.classList.toggle('open');
  arrow.textContent = isOpen ? '▶' : '▼';
}

init();
</script>
</body>
</html>
