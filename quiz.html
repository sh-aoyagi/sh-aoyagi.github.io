.choice.selected { border-color: #4ade80; background: #1f3b2a; }
.choice.optimal { border-color: #4ade80; background: #1f3b2a; }
.choice.wrong { border-color: #f87171; background: #3b1f1f; }
.choice.reveal-best { border-color: #4ade80; background: #1f3b2a; animation: pulse 0.4s; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
.choice-label { font-size: 11px; font-weight: 700; color: #888; margin-bottom: 3px; }
.choice-text { font-size: 14px; color: #ddd; line-height: 1.4; }
.choice-icon { float: right; font-size: 18px; }

.retry-btn { display: block; width: 100%; background: #222; color: #ccc; font-size: 14px; font-weight: 700; padding: 12px; border-radius: 12px; cursor: pointer; border: none; margin-top: 8px; }
</style>
</head>

let currentQ = 0;
let results = [];
let shuffled = [];
let answered = false;

function getTodaySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}

function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for(let i = a.length-1; i > 0; i--) {
    s = (s * 9301 + 49297) % 233280;
    const j = Math.floor((s / 233280) * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  const seed = getTodaySeed();
  shuffled = seededShuffle(allQuestions, seed).slice(0, 10);
  currentQ = 0;
  results = [];
  showQ();
  document.getElementById('screenStart').classList.remove('active');
  document.getElementById('screenQuiz').classList.add('active');
}

function showQ() {
  answered = false;
  const q = shuffled[currentQ];
  document.getElementById('qCounter').textContent = `${currentQ+1} / 10`;
  document.getElementById('qCategory').textContent = q.catLabel;
  document.getElementById('qCategory').className = `q-category ${q.catClass}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qContext').textContent = q.ctx;
  document.getElementById('progressFill').style.width = `${(currentQ/10)*100}%`;

  const fb = document.getElementById('feedbackBox');
  fb.classList.remove('show','wrong');
  document.getElementById('nextBtn').classList.remove('show');

  document.getElementById('choices').innerHTML = q.choices.map(c => `
    <div class="choice" onclick="choose('${c.label}')">
      <div class="choice-label">${c.label}</div>
      <div class="choice-text">${c.text}</div>
    </div>`).join('');
}

function choose(label) {
  if(answered) return;
  answered = true;
  const q = shuffled[currentQ];
  const fb = q.feedback[label];
  const isOk = fb.ok;

  document.querySelectorAll('.choice').forEach(el => {
    const l = el.querySelector('.choice-label').textContent;
    if(l === label) {
      el.classList.add(isOk ? 'optimal' : 'wrong');
      el.querySelector('.choice-text').innerHTML += isOk ? ' <span class="choice-icon">✅</span>' : ' <span class="choice-icon">❌</span>';
    }
    if(!isOk && l === q.optimal) {
      el.classList.add('reveal-best');
      el.querySelector('.choice-text').innerHTML += ' <span class="choice-icon">💡</span>';
    }
  });

  const box = document.getElementById('feedbackBox');
  const header = document.getElementById('feedbackHeader');
  box.classList.add('show');
  if(isOk) {
    header.textContent = '✅ 正解！一流の判断です';
    header.className = 'feedback-header';
    box.classList.remove('wrong');
  } else {
    header.textContent = `❌ 最適解は「${q.optimal}」でした`;
    header.className = 'feedback-header wrong';
    box.classList.add('wrong');
  }
  document.getElementById('feedbackText').innerHTML = fb.text;

  results.push({ q: q.q, chosen: label, optimal: q.optimal, ok: isOk, tip: fb.text.replace(/<[^>]+>/g,'') });
  document.getElementById('nextBtn').classList.add('show');

  saveToSupabase(q, label, fb);
}

async function saveToSupabase(q, label, fb) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/ceo_quiz_logs`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify({
        question_no: currentQ + 1,
        question_text: q.q,
        answer_chosen: label,
        answer_label: q.choices.find(c=>c.label===label).text,
        feedback: fb.text.replace(/<[^>]+>/g,''),
        is_optimal: fb.ok,
        category: q.cat
      })
    });
  } catch(e) { /* silent */ }
}

function nextQ() {
  currentQ++;
  if(currentQ >= 10) {
    showResult();
  } else {
    showQ();
  }
}

function showResult() {
  document.getElementById('screenQuiz').classList.remove('active');
  document.getElementById('screenResult').classList.add('active');
  document.getElementById('progressFill').style.width = '100%';

  const score = results.filter(r=>r.ok).length;
  document.getElementById('scoreBig').textContent = score;

  let grade, comment;
  if(score >= 9) { grade = '🏆 Sランク経営者'; comment = '判断力が極めて高い。この水準の意思決定ができれば、3事業どれも伸ばせる。'; }
  else if(score >= 7) { grade = '🥇 Aランク経営者'; comment = '優秀な判断力。数問の盲点を修正すれば上位に入れる。'; }
  else if(score >= 5) { grade = '🥈 Bランク経営者'; comment = '平均的な経営判断力。特定カテゴリに改善の余地がある。'; }
  else if(score >= 3) { grade = '🥉 Cランク経営者'; comment = '判断の優先順位に課題がある。焦りが判断を曇らせている可能性。'; }
  else { grade = '📚 要修正'; comment = '今の判断パターンを変えないと収益は出ない。フィードバックをよく読んで。'; }

  document.getElementById('gradeText').textContent = grade;
  document.getElementById('gradeComment').textContent = comment;

  document.getElementById('reviewList').innerHTML = results.map((r,i) => `
    <div class="review-item ${r.ok ? '' : 'wrong'}">
      <div class="review-q">Q${i+1}: ${r.q.substring(0,35)}…</div>
      <div class="review-a">あなた: ${r.chosen} ${r.ok ? '✅' : `❌ → 正解: ${r.optimal}`}</div>
      <div class="review-tip ${r.ok ? '' : 'wrong'}">${r.tip.substring(0,60)}…</div>
    </div>`).join('');

  const wrongCats = results.filter(r=>!r.ok).map(r=>shuffled[results.indexOf(r)]?.cat || '').filter(Boolean);
  const catCount = {};
  wrongCats.forEach(c=>{ catCount[c]=(catCount[c]||0)+1; });
  const weakest = Object.entries(catCount).sort((a,b)=>b[1]-a[1])[0];

  const mdText = `## CEOクイズ記録（${new Date().toLocaleDateString('ja-JP')}）
スコア：${score}/10 ${grade}
弱点カテゴリ：${weakest ? weakest[0] : 'なし'}

【判断パターン（改善メモ）】
${results.filter(r=>!r.ok).slice(0,3).map(r=>`・${r.q.substring(0,30)}… → ${r.optimal}を選ぶべきだった`).join('\n')}

【強みの判断軸】
${results.filter(r=>r.ok).slice(0,2).map(r=>`・${r.q.substring(0,30)}… → 正しく判断できた`).join('\n')}`;

  document.getElementById('mdUpdate').textContent = mdText;
}

function copyMD() {
  const text = document.getElementById('mdUpdate').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.querySelector('.copy-md-btn');
    btn.textContent = '✅ コピーしました → CLAUDE.mdに貼り付けてください';
    setTimeout(()=>{ btn.textContent = '📋 CLAUDE.mdにコピーして貼り付け'; }, 3000);
  });
}

function retryQuiz() {
  document.getElementById('screenResult').classList.remove('active');
  document.getElementById('screenStart').classList.add('active');
  document.getElementById('progressFill').style.width = '0%';
}

// Init
const d = new Date();
document.getElementById('todayDate').textContent = `${d.getMonth()+1}/${d.getDate()}`;
</script>
